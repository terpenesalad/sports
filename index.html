<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Next Match">
  <meta name="theme-color" content="#111111">
  <title>Next Match</title>

  <!-- PWA manifest inline via JS (no extra file needed) -->
  <script>
    const manifest = {
      name: "Next Match",
      short_name: "Next Match",
      description: "Carlton, West Ham & Wycombe fixtures",
      start_url: ".",
      display: "standalone",
      background_color: "#111111",
      theme_color: "#111111",
      icons: [
        {
          src: "data:image/svg+xml," + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="36" fill="#111"/><text x="96" y="130" font-size="110" text-anchor="middle" font-family="system-ui,sans-serif">⚽</text></svg>`),
          sizes: "192x192",
          type: "image/svg+xml"
        }
      ]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
    const url  = URL.createObjectURL(blob);
    const link = document.createElement('link');
    link.rel = 'manifest'; link.href = url;
    document.currentScript.after(link);
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #111111;
      --surface: #1a1a1a;
      --line:    rgba(255,255,255,0.07);
      --text:    #e8e8e8;
      --sub:     #888;
      --dim:     #555;
      --accent:  #e8e8e8;
    }

    html, body {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ──────────────────────────────── */

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 16px;
      border-bottom: 1px solid var(--line);
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--sub);
    }

    .header-btns { display: flex; gap: 2px; }

    .hbtn {
      background: none;
      border: none;
      color: var(--dim);
      font-size: 18px;
      width: 34px;
      height: 34px;
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.12s, background 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hbtn:hover { color: var(--text); background: rgba(255,255,255,0.05); }

    /* ── WEEK NAV ────────────────────────────── */

    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 20px 20px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .nav-btn {
      background: none;
      border: none;
      color: var(--dim);
      font-size: 22px;
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: color 0.12s, background 0.12s;
      flex-shrink: 0;
    }
    .nav-btn:hover  { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-btn:active { color: var(--sub); }

    .week-info { text-align: center; flex: 1; padding: 0 12px; }

    .week-dates {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .week-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim);
      margin-top: 4px;
      min-height: 14px;
    }

    /* ── GRID ────────────────────────────────── */

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--line);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      flex: 1;
    }

    /* ── COLUMN ──────────────────────────────── */

    .col {
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    .col-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--line);
    }

    .col-team {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    .col-league {
      font-size: 10px;
      color: var(--dim);
      margin-top: 2px;
      letter-spacing: 0.02em;
    }

    /* ── MATCH ───────────────────────────────── */

    .match {
      padding: 14px 16px 13px;
      border-bottom: 1px solid var(--line);
    }
    .match:last-child { border-bottom: none; }

    .opp {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--text);
      line-height: 1.25;
      margin-bottom: 9px;
    }

    .match-when {
      font-size: 12px;
      font-weight: 500;
      color: var(--sub);
      margin-bottom: 2px;
    }

    .match-time {
      font-size: 12px;
      color: var(--dim);
      margin-bottom: 8px;
    }

    .match-venue {
      font-size: 11px;
      color: var(--dim);
      margin-bottom: 8px;
    }

    .match-tags {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 3px;
    }

    .tag-home {
      background: rgba(255,255,255,0.08);
      color: var(--sub);
    }

    .tag-away {
      background: transparent;
      color: var(--dim);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .tag-comp {
      font-size: 10px;
      color: var(--dim);
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
    }

    /* ── WEEK OFF ────────────────────────────── */

    .week-off {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 14px;
      min-height: 100px;
    }

    .week-off span {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.08);
    }

    /* ── LOADING ─────────────────────────────── */

    .loading {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .spinner {
      width: 20px; height: 20px;
      border: 1.5px solid rgba(255,255,255,0.08);
      border-top-color: var(--sub);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 12px;
      color: var(--dim);
      letter-spacing: 0.04em;
    }

    /* ── ERROR ───────────────────────────────── */

    .error-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px 28px;
      text-align: center;
    }

    .error-msg {
      font-size: 13px;
      color: #c0503a;
      line-height: 1.7;
      max-width: 340px;
    }

    .error-btn {
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--sub);
      font-size: 12px;
      font-weight: 500;
      padding: 8px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.12s;
    }
    .error-btn:hover { color: var(--text); }

    /* ── SETUP ───────────────────────────────── */

    .setup {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px 24px;
    }

    .setup-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .setup-sub {
      font-size: 12px;
      color: var(--dim);
      text-align: center;
      max-width: 280px;
      line-height: 1.7;
      margin-bottom: 4px;
    }

    .setup-input {
      width: 100%;
      max-width: 320px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font-family: "SF Mono", Menlo, monospace;
      font-size: 12px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .setup-input:focus { border-color: var(--sub); }

    .setup-btn {
      width: 100%;
      max-width: 320px;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      padding: 11px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.12s;
      font-family: inherit;
      margin-top: 2px;
    }
    .setup-btn:hover { background: rgba(255,255,255,0.07); }

    .setup-cancel {
      background: none;
      border: none;
      color: var(--dim);
      font-size: 12px;
      cursor: pointer;
      padding: 4px 8px;
      font-family: inherit;
      transition: color 0.12s;
    }
    .setup-cancel:hover { color: var(--sub); }

    /* ── FOOTER ──────────────────────────────── */

    .footer {
      text-align: center;
      padding: 12px 0 14px;
      font-size: 10px;
      color: rgba(255,255,255,0.12);
      letter-spacing: 0.04em;
      border-top: 1px solid var(--line);
    }

    /* ── MOBILE ──────────────────────────────── */

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
        gap: 0;
      }
      .col { border-bottom: 1px solid var(--line); }
      .col:last-child { border-bottom: none; }
      .week-nav { padding: 20px 16px 18px; }
      .week-dates { font-size: 15px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">Next Match</div>
    <div class="header-btns">
      <button class="hbtn" id="refreshBtn" onclick="load(true)" style="display:none" title="Refresh">↺</button>
      <button class="hbtn" onclick="openSettings()" title="Settings" style="font-size:15px">⚙︎</button>
    </div>
  </div>

  <div id="root"></div>
  <div class="footer" id="footer"></div>

  <script>
    /* ── Service Worker (for PWA install) ───── */
    if ('serviceWorker' in navigator) {
      const sw = `
        const CACHE = 'next-match-v1';
        self.addEventListener('install', e => {
          self.skipWaiting();
        });
        self.addEventListener('activate', e => {
          e.waitUntil(caches.keys().then(keys =>
            Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
          ));
        });
        self.addEventListener('fetch', e => {
          // Network-first: always try live, fall back to cache
          if (e.request.method !== 'GET') return;
          e.respondWith(
            fetch(e.request).then(res => {
              const clone = res.clone();
              caches.open(CACHE).then(c => c.put(e.request, clone));
              return res;
            }).catch(() => caches.match(e.request))
          );
        });
      `;
      const blob = new Blob([sw], { type: 'application/javascript' });
      navigator.serviceWorker.register(URL.createObjectURL(blob))
        .catch(() => {});
    }

    /* ── Constants ─────────────────────────── */
    const KEY_STORE   = 'nm_apikey';
    const CACHE_STORE = 'nm_cache';
    const CACHE_TTL   = 8 * 60 * 60 * 1000;

    let fixtures    = [];
    let weekOffset  = 0;
    let cacheTime   = null;
    let footerTimer = null;

    /* ── AFL name map ───────────────────────── */
    const AFL_NAMES = {
      'Adelaide Crows Football Club':    'Adelaide Crows',
      'Brisbane Lions Football Club':    'Brisbane Lions',
      'Carlton Football Club':           'Carlton',
      'Carlton Blues':                   'Carlton',
      'Collingwood Football Club':       'Collingwood',
      'Collingwood Magpies':             'Collingwood',
      'Essendon Football Club':          'Essendon',
      'Essendon Bombers':                'Essendon',
      'Fremantle Football Club':         'Fremantle',
      'Fremantle Dockers':               'Fremantle',
      'Geelong Football Club':           'Geelong',
      'Geelong Cats':                    'Geelong',
      'Gold Coast Suns Football Club':   'Gold Coast Suns',
      'Gold Coast Football Club':        'Gold Coast Suns',
      'Greater Western Sydney Giants':   'GWS Giants',
      'GWS Giants Football Club':        'GWS Giants',
      'GWS GIANTS':                      'GWS Giants',
      'Hawthorn Football Club':          'Hawthorn',
      'Hawthorn Hawks':                  'Hawthorn',
      'Melbourne Football Club':         'Melbourne',
      'Melbourne Demons':                'Melbourne',
      'North Melbourne Football Club':   'North Melbourne',
      'North Melbourne Kangaroos':       'North Melbourne',
      'Port Adelaide Football Club':     'Port Adelaide',
      'Port Adelaide Power':             'Port Adelaide',
      'Richmond Football Club':          'Richmond',
      'Richmond Tigers':                 'Richmond',
      'St Kilda Football Club':          'St Kilda',
      'St Kilda Saints':                 'St Kilda',
      'Sydney Swans Football Club':      'Sydney Swans',
      'West Coast Eagles Football Club': 'West Coast Eagles',
      'Western Bulldogs Football Club':  'Western Bulldogs',
    };

    const TEAM_LEAGUE = {
      Carlton: 'AFL',
      WestHam: 'Premier League',
      Wycombe: 'EFL League One',
    };

    function normaliseOpp(name, team) {
      if (team !== 'Carlton') return name;
      return AFL_NAMES[name] || name.replace(/ Football Club$/, '').replace(/ FC$/, '');
    }

    /* ── Week helpers ───────────────────────── */
    function weekBounds(offset) {
      const now = new Date();
      const dow = now.getDay();
      const toMon = dow === 0 ? -6 : 1 - dow;
      const mon = new Date(now);
      mon.setDate(now.getDate() + toMon + offset * 7);
      mon.setHours(0, 0, 0, 0);
      const sun = new Date(mon);
      sun.setDate(mon.getDate() + 6);
      sun.setHours(23, 59, 59, 999);
      return { mon, sun };
    }

    function fmtRange(mon, sun) {
      const o = { day: 'numeric', month: 'short' };
      return `${mon.toLocaleDateString('en-AU', o)} – ${sun.toLocaleDateString('en-AU', o)}`;
    }

    function weekLabel(offset) {
      if (offset === 0)  return 'This week';
      if (offset === 1)  return 'Next week';
      if (offset === -1) return 'Last week';
      return offset > 0 ? `In ${offset} weeks` : `${Math.abs(offset)} weeks ago`;
    }

    function teamGames(team, mon, sun) {
      return fixtures
        .filter(f => {
          if (f.team !== team) return false;
          const t = +new Date(f.date);
          return t >= +mon && t <= +sun;
        })
        .sort((a, b) => +new Date(a.date) - +new Date(b.date));
    }

    function fmtDay(d) {
      return new Date(d).toLocaleDateString('en-AU', { weekday:'short', day:'numeric', month:'short' });
    }
    function fmtTime(d) {
      return new Date(d).toLocaleTimeString('en-AU', { hour:'numeric', minute:'2-digit', hour12:true }).toLowerCase();
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── Render ─────────────────────────────── */

    function matchHTML(m) {
      const opp  = esc(normaliseOpp(m.opponent, m.team));
      const isHome = m.home;
      const venue = m.stadium ? `<div class="match-venue">${esc(m.stadium)}</div>` : '';
      return `
        <div class="match">
          <div class="opp">${opp}</div>
          <div class="match-when">${fmtDay(m.date)}</div>
          <div class="match-time">${fmtTime(m.date)}</div>
          ${venue}
          <div class="match-tags">
            <span class="tag ${isHome ? 'tag-home' : 'tag-away'}">${isHome ? 'Home' : 'Away'}</span>
            <span class="tag-comp">${esc(m.competition)}</span>
          </div>
        </div>`;
    }

    function colHTML(team, label) {
      const { mon, sun } = weekBounds(weekOffset);
      const games  = teamGames(team, mon, sun);
      const league = TEAM_LEAGUE[team] || '';
      const body   = games.length
        ? games.map(matchHTML).join('')
        : `<div class="week-off"><span>Week off</span></div>`;
      return `
        <div class="col">
          <div class="col-header">
            <div class="col-team">${label}</div>
            <div class="col-league">${league}</div>
          </div>
          ${body}
        </div>`;
    }

    function renderWeek() {
      const { mon, sun } = weekBounds(weekOffset);
      document.getElementById('wDates').textContent = fmtRange(mon, sun);
      document.getElementById('wLabel').textContent = weekLabel(weekOffset);
      document.getElementById('grid').innerHTML =
        colHTML('Carlton', 'Carlton') +
        colHTML('WestHam', 'West Ham') +
        colHTML('Wycombe', 'Wycombe');
    }

    function showMain() {
      document.getElementById('refreshBtn').style.display = '';
      document.getElementById('root').innerHTML = `
        <div class="week-nav">
          <button class="nav-btn" onclick="shiftWeek(-1)">←</button>
          <div class="week-info">
            <div class="week-dates" id="wDates"></div>
            <div class="week-label" id="wLabel"></div>
          </div>
          <button class="nav-btn" onclick="shiftWeek(1)">→</button>
        </div>
        <div class="grid" id="grid"></div>`;
      renderWeek();
      startFooterTimer();
    }

    function shiftWeek(d) { weekOffset += d; renderWeek(); }

    /* ── Footer ─────────────────────────────── */

    function startFooterTimer() {
      clearInterval(footerTimer);
      tickFooter();
      footerTimer = setInterval(tickFooter, 30000);
    }

    function tickFooter() {
      const el = document.getElementById('footer');
      if (!el || !cacheTime) return;
      const mins = Math.round((Date.now() - cacheTime) / 60000);
      const ago = mins < 1 ? 'just now' : mins === 1 ? '1 min ago' : `${mins} mins ago`;
      el.textContent = `Fetched ${ago}`;
    }

    /* ── Storage ────────────────────────────── */

    function getKey()   { return localStorage.getItem(KEY_STORE); }
    function saveKey(k) { localStorage.setItem(KEY_STORE, k); }

    function getCache() {
      try {
        const raw = localStorage.getItem(CACHE_STORE);
        if (!raw) return null;
        const { data, ts } = JSON.parse(raw);
        if (Date.now() - ts > CACHE_TTL) return null;
        cacheTime = ts;
        return data;
      } catch { return null; }
    }

    function setCache(data) {
      cacheTime = Date.now();
      localStorage.setItem(CACHE_STORE, JSON.stringify({ data, ts: cacheTime }));
    }

    /* ── API ────────────────────────────────── */

    async function fetchFixtures(apiKey) {
      const today = new Date().toLocaleDateString('en-AU', {
        weekday:'long', year:'numeric', month:'long', day:'numeric',
        timeZone:'Australia/Melbourne'
      });

      const prompt = `Today is ${today} Melbourne time (Australia/Melbourne, AEDT UTC+11, switching to AEST UTC+10 on 5 April 2026).

Search for upcoming fixtures for these 3 teams and return ONLY a valid JSON array — no markdown, no code fences, no explanation. Just the raw JSON array starting with [ and ending with ].

Team 1 — Carlton FC (AFL):
Search "Carlton Blues AFL fixtures 2026" or visit carltonfc.com.au/matches/fixture
Times are already Melbourne local time.
Home stadiums: MCG or Marvel Stadium depending on game.

Team 2 — Wycombe Wanderers FC:
Search "Wycombe Wanderers fixtures 2026"
Convert UK time (BST, UTC+1) → Melbourne: add 10h before 5 Apr, add 9h from 5 Apr.
Home ground: Adams Park, High Wycombe.
Away games: use the opponent's ground name.

Team 3 — West Ham United:
Fetch https://www.espn.com.au/football/team/fixtures/_/id/371/eng.west_ham
Times already in Melbourne AEDT/AEST.
Home stadium: London Stadium.
Away games: use the opponent's ground name.

Each JSON object must have EXACTLY these fields:
- "team": exactly "Carlton", "WestHam", or "Wycombe"
- "date": ISO 8601 datetime in Melbourne local time, e.g. "2026-04-05T14:10:00"
- "opponent": full name of opposing team
- "competition": e.g. "AFL Round 5", "Premier League", "EFL League One"
- "home": boolean
- "stadium": ground/stadium name (e.g. "MCG", "London Stadium", "Adams Park"). Empty string if unknown.

Include all upcoming matches for the next 14 weeks. Return ONLY the JSON array, nothing else.`;

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 4000,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!res.ok) {
        const body = await res.text().catch(() => '');
        let msg = `API error ${res.status}`;
        try { const j = JSON.parse(body); if (j?.error?.message) msg += ': ' + j.error.message; } catch {}
        throw new Error(msg);
      }

      const data  = await res.json();
      const text  = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
      const clean = text.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
      const m     = clean.match(/\[[\s\S]*\]/);
      if (!m) throw new Error('No fixture data returned. Try refreshing.');
      const parsed = JSON.parse(m[0]);
      if (!Array.isArray(parsed) || !parsed.length) throw new Error('Fixture list is empty.');
      return parsed;
    }

    /* ── Load ───────────────────────────────── */

    async function load(force = false) {
      const key = getKey();
      if (!key) { showSetup(); return; }

      if (!force) {
        const cached = getCache();
        if (cached?.length) { fixtures = cached; weekOffset = 0; showMain(); return; }
      }

      clearInterval(footerTimer);
      document.getElementById('refreshBtn').style.display = 'none';
      document.getElementById('footer').textContent = '';
      document.getElementById('root').innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <div class="loading-text">Fetching fixtures…</div>
        </div>`;

      try {
        fixtures = await fetchFixtures(key);
        setCache(fixtures);
        weekOffset = 0;
        showMain();
      } catch (err) {
        document.getElementById('root').innerHTML = `
          <div class="error-wrap">
            <div class="error-msg">${esc(err.message)}</div>
            <button class="error-btn" onclick="load(true)">Try again</button>
          </div>`;
      }
    }

    function showSetup(isEdit = false) {
      clearInterval(footerTimer);
      document.getElementById('refreshBtn').style.display = 'none';
      document.getElementById('footer').textContent = '';
      const cur = getKey() || '';
      document.getElementById('root').innerHTML = `
        <div class="setup">
          <div class="setup-title">API Key</div>
          <div class="setup-sub">Enter your Anthropic API key. Stored locally, only sent to api.anthropic.com.</div>
          <input class="setup-input" id="apiIn" type="password" placeholder="sk-ant-api03-…" value="${esc(cur)}" onkeydown="if(event.key==='Enter')submitKey()">
          <button class="setup-btn" onclick="submitKey()">Save &amp; Load</button>
          ${isEdit && fixtures.length ? `<button class="setup-cancel" onclick="showMain()">Cancel</button>` : ''}
        </div>`;
      setTimeout(() => document.getElementById('apiIn')?.focus(), 50);
    }

    function openSettings() { showSetup(true); }

    function submitKey() {
      const k = (document.getElementById('apiIn')?.value || '').trim();
      if (!k) return;
      saveKey(k);
      load(true);
    }

    load();
  </script>
</body>
</html>
