<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Next Match</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0c0c0c;
      --surface: #141414;
      --border:  #222;
      --text:    #ddd8d0;
      --muted:   #444;
      --dim:     #686460;
      --gold:    #b89a50;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ─────────────────────────────── */

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px 0;
    }

    .app-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .topbar-actions {
      display: flex;
      gap: 5px;
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      font-size: 12px;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.13s;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: 0.04em;
      line-height: 1.6;
    }
    .icon-btn:hover { color: var(--text); border-color: #444; }

    /* ── WEEK NAV ────────────────────────────── */

    .week-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 28px;
      padding: 32px 20px 26px;
    }

    .nav-arrow {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 6px 10px;
      transition: color 0.13s;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      user-select: none;
    }
    .nav-arrow:hover { color: var(--text); }

    .week-center {
      text-align: center;
      min-width: 220px;
    }

    .week-range {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 20px;
      letter-spacing: 0.07em;
      color: var(--text);
    }

    .week-tag {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 5px;
      min-height: 10px;
    }

    /* ── GRID ────────────────────────────────── */

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 0 20px 28px;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── CARD ────────────────────────────────── */

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 200px;
      position: relative;
      overflow: hidden;
    }

    /* very faint team-color wash at top */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, var(--tc, #222) 0%, transparent 40%);
      opacity: 0.12;
      pointer-events: none;
    }

    .carlton { --tc: #0a2258; }
    .westham { --tc: #7a1635; }
    .wycombe { --tc: #1a4e8f; }

    .card-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 13px 11px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .stripe {
      width: 3px;
      height: 22px;
      border-radius: 2px;
      background: var(--tc);
      flex-shrink: 0;
    }

    .team-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
    }

    /* ── MATCH ENTRY ─────────────────────────── */

    .match {
      padding: 15px 13px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .match:last-child { border-bottom: none; flex: 1; }

    .opp {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 18px;
      line-height: 1.15;
      margin-bottom: 9px;
      color: var(--text);
    }

    .vs {
      font-size: 11px;
      font-weight: 400;
      color: var(--dim);
      margin-right: 3px;
    }

    .m-date {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--gold);
    }

    .m-time {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.03em;
    }

    .sep { color: var(--border); padding: 0 4px; font-size: 9px; }

    .m-comp {
      font-size: 10px;
      color: var(--muted);
      margin-top: 5px;
      font-family: 'Barlow', sans-serif;
    }

    .badge {
      display: inline-block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 2px 6px;
      border: 1px solid;
      margin-top: 7px;
    }
    .badge.home { color: var(--tc); border-color: var(--tc); }
    .badge.away { color: var(--muted); border-color: var(--border); }

    /* ── WEEK OFF ────────────────────────────── */

    .week-off {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 14px;
    }

    .week-off-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: #2b2b2b;
    }

    /* ── LOADING ─────────────────────────────── */

    .loading {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 60px 24px;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 1.5px solid var(--border);
      border-top-color: var(--dim);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── ERROR ───────────────────────────────── */

    .error-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 40px 24px;
      text-align: center;
    }

    .error-msg {
      font-size: 11px;
      color: #a03030;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: 0.04em;
      max-width: 380px;
      line-height: 1.7;
    }

    .retry-btn {
      background: none;
      border: 1px solid #a03030;
      color: #a03030;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.13s;
    }
    .retry-btn:hover { background: #a0303015; }

    /* ── SETUP ───────────────────────────────── */

    .setup {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 40px 24px;
    }

    .setup-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text);
    }

    .setup-desc {
      font-size: 11px;
      color: var(--dim);
      text-align: center;
      max-width: 280px;
      line-height: 1.8;
    }

    .setup-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: monospace;
      font-size: 11px;
      padding: 9px 12px;
      width: 100%;
      max-width: 340px;
      outline: none;
      transition: border-color 0.13s;
    }
    .setup-input:focus { border-color: #444; }

    .setup-go {
      background: none;
      border: 1px solid #444;
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 9px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      padding: 9px 22px;
      cursor: pointer;
      transition: all 0.13s;
    }
    .setup-go:hover { background: var(--border); }

    /* ── FOOTER ──────────────────────────────── */

    .footer {
      text-align: center;
      padding: 0 0 16px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #272727;
    }

    /* ── MOBILE ──────────────────────────────── */

    @media (max-width: 560px) {
      .grid {
        grid-template-columns: 1fr;
        padding: 0 14px 24px;
        gap: 8px;
      }
      .card { min-height: unset; }
      .week-nav { padding: 24px 16px 20px; gap: 18px; }
      .week-range { font-size: 16px; }
      .week-center { min-width: 160px; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="app-title">Next Match</div>
    <div class="topbar-actions">
      <button class="icon-btn" id="refreshBtn" onclick="load(true)" style="display:none" title="Refresh">↺</button>
      <button class="icon-btn" onclick="openSettings()" title="Settings">⚙</button>
    </div>
  </div>

  <div id="root"></div>
  <div class="footer" id="footer"></div>

  <script>
    const KEY_STORE   = 'nm_apikey';
    const CACHE_STORE = 'nm_cache';
    const CACHE_TTL   = 8 * 60 * 60 * 1000; // 8 hrs

    let fixtures   = [];
    let weekOffset = 0;
    let cacheTime  = null;
    let footerTimer = null;

    // ── Week helpers ───────────────────────────────────────────

    function weekBounds(offset) {
      const now = new Date();
      const dow = now.getDay(); // 0 = Sun
      const toMon = dow === 0 ? -6 : 1 - dow;
      const mon = new Date(now);
      mon.setDate(now.getDate() + toMon + offset * 7);
      mon.setHours(0, 0, 0, 0);
      const sun = new Date(mon);
      sun.setDate(mon.getDate() + 6);
      sun.setHours(23, 59, 59, 999);
      return { mon, sun };
    }

    function fmtRange(mon, sun) {
      const opt = { day: 'numeric', month: 'short' };
      const a = mon.toLocaleDateString('en-AU', opt).toUpperCase();
      const b = sun.toLocaleDateString('en-AU', opt).toUpperCase();
      return `${a} – ${b} ${sun.getFullYear()}`;
    }

    function weekTag(offset) {
      if (offset ===  0) return 'THIS WEEK';
      if (offset ===  1) return 'NEXT WEEK';
      if (offset === -1) return 'LAST WEEK';
      return offset > 0 ? `+${offset} WEEKS` : `${Math.abs(offset)} WEEKS AGO`;
    }

    function teamMatches(team, mon, sun) {
      return fixtures
        .filter(f => {
          if (f.team !== team) return false;
          const t = +new Date(f.date);
          return t >= +mon && t <= +sun;
        })
        .sort((a, b) => +new Date(a.date) - +new Date(b.date));
    }

    function fmtDay(d) {
      return new Date(d).toLocaleDateString('en-AU', {
        weekday: 'short', day: 'numeric', month: 'short'
      }).toUpperCase();
    }

    function fmtTime(d) {
      return new Date(d).toLocaleTimeString('en-AU', {
        hour: 'numeric', minute: '2-digit', hour12: true
      }).toLowerCase();
    }

    // ── Render ─────────────────────────────────────────────────

    function matchHtml(m) {
      return `
        <div class="match">
          <div class="opp"><span class="vs">vs </span>${escHtml(m.opponent)}</div>
          <div>
            <span class="m-date">${fmtDay(m.date)}</span>
            <span class="sep">·</span>
            <span class="m-time">${fmtTime(m.date)}</span>
          </div>
          <div class="m-comp">${escHtml(m.competition)}</div>
          <span class="badge ${m.home ? 'home' : 'away'}">${m.home ? 'Home' : 'Away'}</span>
        </div>`;
    }

    function cardHtml(team, cls, label) {
      const { mon, sun } = weekBounds(weekOffset);
      const ms = teamMatches(team, mon, sun);
      const body = ms.length
        ? ms.map(matchHtml).join('')
        : `<div class="week-off"><div class="week-off-text">Week Off</div></div>`;
      return `
        <div class="card ${cls}">
          <div class="card-head">
            <div class="stripe"></div>
            <div class="team-name">${label}</div>
          </div>
          ${body}
        </div>`;
    }

    function renderWeek() {
      const { mon, sun } = weekBounds(weekOffset);
      document.getElementById('wRange').textContent = fmtRange(mon, sun);
      document.getElementById('wTag').textContent   = weekTag(weekOffset);
      document.getElementById('cards').innerHTML =
        cardHtml('Carlton', 'carlton', 'Carlton') +
        cardHtml('WestHam', 'westham', 'West Ham') +
        cardHtml('Wycombe', 'wycombe', 'Wycombe');
    }

    function showMain() {
      document.getElementById('refreshBtn').style.display = '';
      document.getElementById('root').innerHTML = `
        <div class="week-nav">
          <button class="nav-arrow" onclick="shiftWeek(-1)">←</button>
          <div class="week-center">
            <div class="week-range" id="wRange"></div>
            <div class="week-tag" id="wTag"></div>
          </div>
          <button class="nav-arrow" onclick="shiftWeek(1)">→</button>
        </div>
        <div class="grid" id="cards"></div>`;
      renderWeek();
      startFooterTimer();
    }

    function shiftWeek(d) { weekOffset += d; renderWeek(); }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Footer timer ───────────────────────────────────────────

    function startFooterTimer() {
      clearInterval(footerTimer);
      tickFooter();
      footerTimer = setInterval(tickFooter, 30000);
    }

    function tickFooter() {
      const el = document.getElementById('footer');
      if (!el || !cacheTime) return;
      const mins = Math.round((Date.now() - cacheTime) / 60000);
      const ago = mins < 1 ? 'just now' : mins === 1 ? '1 min ago' : `${mins} mins ago`;
      el.textContent = `Fixtures last fetched ${ago}`;
    }

    // ── Storage ────────────────────────────────────────────────

    function getKey()   { return localStorage.getItem(KEY_STORE); }
    function saveKey(k) { localStorage.setItem(KEY_STORE, k); }

    function getCache() {
      try {
        const raw = localStorage.getItem(CACHE_STORE);
        if (!raw) return null;
        const { data, ts } = JSON.parse(raw);
        if (Date.now() - ts > CACHE_TTL) return null;
        cacheTime = ts;
        return data;
      } catch { return null; }
    }

    function setCache(data) {
      cacheTime = Date.now();
      localStorage.setItem(CACHE_STORE, JSON.stringify({ data, ts: cacheTime }));
    }

    // ── API call ───────────────────────────────────────────────

    async function fetchFixtures(apiKey) {
      const today = new Date().toLocaleDateString('en-AU', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
        timeZone: 'Australia/Melbourne'
      });

      const prompt = `Today is ${today} Melbourne time (Australia/Melbourne timezone, currently AEDT UTC+11 switching to AEST UTC+10 on 5 April 2026).

Search for upcoming fixtures for these 3 teams and return ONLY a valid JSON array. No markdown, no code fences, no explanation text — just the raw JSON array, starting with [ and ending with ].

Team 1 — Carlton FC (AFL):
Search for "Carlton Blues AFL fixtures 2026" or visit carltonfc.com.au/matches/fixture
All times on their site are already in Melbourne local time.

Team 2 — Wycombe Wanderers FC:
Search for "Wycombe Wanderers FC fixtures 2026" or "WWFC upcoming matches"
Their site shows UK time. Convert to Melbourne:
- Before 5 Apr 2026: UK is BST (UTC+1), Melbourne is AEDT (UTC+11) → add 10 hours
- From 5 Apr 2026: UK is BST (UTC+1), Melbourne is AEST (UTC+10) → add 9 hours

Team 3 — West Ham United:
Fetch https://www.espn.com.au/football/team/fixtures/_/id/371/eng.west_ham
Times on this page are ALREADY in Melbourne AEDT/AEST (it's the Australian ESPN site).

Return a JSON array. Each object must have EXACTLY these fields:
- "team": exactly "Carlton", "WestHam", or "Wycombe"
- "date": ISO 8601 datetime in Melbourne local time, e.g. "2026-04-05T14:10:00"
- "opponent": full name of the opposing team
- "competition": competition name, e.g. "AFL Round 5", "Premier League", "EFL League One"
- "home": boolean — true if team plays at home, false if away

Include all upcoming matches for the next 14 weeks. Return ONLY the JSON array, nothing else.`;

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 4000,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!res.ok) {
        const body = await res.text().catch(() => '');
        let msg = `API error ${res.status}`;
        try {
          const j = JSON.parse(body);
          if (j?.error?.message) msg += ': ' + j.error.message;
        } catch {}
        throw new Error(msg);
      }

      const data = await res.json();

      // Grab all text blocks (some may come after tool_use blocks)
      const text = (data.content || [])
        .filter(b => b.type === 'text')
        .map(b => b.text)
        .join('');

      // Strip markdown fences if present
      const clean = text
        .replace(/```json\s*/gi, '')
        .replace(/```\s*/g, '')
        .trim();

      // Pull out JSON array
      const m = clean.match(/\[[\s\S]*\]/);
      if (!m) throw new Error('No fixture data returned. The search may have failed — please try refreshing.');

      const parsed = JSON.parse(m[0]);
      if (!Array.isArray(parsed) || parsed.length === 0) {
        throw new Error('Fixture list is empty. Try refreshing.');
      }

      return parsed;
    }

    // ── Load flow ──────────────────────────────────────────────

    async function load(force = false) {
      const key = getKey();
      if (!key) { showSetup(); return; }

      if (!force) {
        const cached = getCache();
        if (cached && cached.length) {
          fixtures = cached;
          weekOffset = 0;
          showMain();
          return;
        }
      }

      // Loading state
      clearInterval(footerTimer);
      document.getElementById('refreshBtn').style.display = 'none';
      document.getElementById('footer').textContent = '';
      document.getElementById('root').innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <div class="loading-label">Fetching fixtures…</div>
        </div>`;

      try {
        const data = await fetchFixtures(key);
        fixtures = data;
        setCache(fixtures);
        weekOffset = 0;
        showMain();
      } catch (err) {
        document.getElementById('root').innerHTML = `
          <div class="error-wrap">
            <div class="error-msg">${escHtml(err.message)}</div>
            <button class="retry-btn" onclick="load(true)">↺ Retry</button>
          </div>`;
      }
    }

    function showSetup(isEdit = false) {
      clearInterval(footerTimer);
      document.getElementById('refreshBtn').style.display = 'none';
      document.getElementById('footer').textContent = '';
      const cur = getKey() || '';
      document.getElementById('root').innerHTML = `
        <div class="setup">
          <div class="setup-title">API Key</div>
          <div class="setup-desc">Enter your Anthropic API key. Stored in localStorage, only sent to api.anthropic.com.</div>
          <input class="setup-input" id="apiIn" type="password" placeholder="sk-ant-api03-…" value="${escHtml(cur)}" onkeydown="if(event.key==='Enter')submitKey()">
          <button class="setup-go" onclick="submitKey()">Save &amp; Load</button>
          ${isEdit && fixtures.length ? `<button class="icon-btn" onclick="showMain()" style="margin-top:4px">Cancel</button>` : ''}
        </div>`;
      setTimeout(() => document.getElementById('apiIn')?.focus(), 50);
    }

    function openSettings() { showSetup(true); }

    function submitKey() {
      const k = (document.getElementById('apiIn')?.value || '').trim();
      if (!k) return;
      saveKey(k);
      load(true);
    }

    // ── Init ───────────────────────────────────────────────────
    load();
  </script>
</body>
</html>
