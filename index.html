<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Match</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #0f0f0f;
    color: #e8e8e8;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    padding: 48px 32px 64px;
    max-width: 520px;
    margin: 0 auto;
  }

  header { margin-bottom: 56px; }

  .wordmark {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #444;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card {
    padding: 28px 24px;
    border-radius: 2px;
    position: relative;
    overflow: hidden;
    min-height: 150px;
    display: flex;
    align-items: stretch;
  }

  .card-content {
    flex: 1;
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding-right: 120px;
  }

  .card-crest {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 1;
    width: 100px;
    height: 100px;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.85;
  }

  .card-crest img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
  }

  .team-name {
    font-size: 25px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 5px;
  }

  .league {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 18px;
    opacity: 0.55;
  }

  .fixture-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }

  .opponent { font-size: 13px; font-weight: 300; }

  .vs {
    font-size: 10px;
    margin-right: 4px;
    opacity: 0.5;
  }

  .time-block { text-align: right; flex-shrink: 0; }

  .time-melbourne {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .date-str {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 3px;
    opacity: 0.55;
  }

  .countdown {
    margin-top: 12px;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.55;
  }

  .countdown .val { font-weight: 700; opacity: 1; }

  .pill-live {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 2px 7px;
    margin-left: 8px;
    vertical-align: middle;
    animation: blink 1.4s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  .live-score {
    margin-top: 14px;
    display: flex;
    align-items: center;
  }

  .score-team {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.7;
    flex: 1;
  }

  .score-team.home { text-align: left; }
  .score-team.away { text-align: right; }

  .score-nums {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
    padding: 0 12px;
    flex-shrink: 0;
  }

  .score-minute {
    margin-top: 6px;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.5;
    text-align: center;
  }

  .venue {
    font-size: 10px;
    margin-top: 5px;
    opacity: 0.4;
  }

  .skeleton {
    background: #1a1a1a;
    border-radius: 2px;
    min-height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 24px;
  }

  .skeleton-text {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #2a2a2a;
    animation: pulse 1.6s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .updated {
    margin-top: 40px;
    font-size: 10px;
    color: #2a2a2a;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .error-card {
    background: #1a1a1a;
    border-radius: 2px;
    padding: 24px;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #333;
  }
</style>
</head>
<body>

<header>
  <div class="wordmark">Are we sleeping tonight?</div>
</header>

<div class="cards" id="cards"></div>
<div class="updated" id="updated"></div>

<script>
  const MELBOURNE_TZ = 'Australia/Melbourne';

  const TEAMS = [
    {
      name: "West Ham United",
      short: "West Ham",
      query: "West Ham United next fixture 2026",
      bg: "#7A263A",
      fg: "#FFFFFF",
      crest: "https://resources.premierleague.com/premierleague/badges/100/t21.png"
    },
    {
      name: "Wycombe Wanderers",
      short: "Wycombe",
      query: "Wycombe Wanderers next fixture 2026",
      bg: "#1B3F8B",
      fg: "#FFFFFF",
      crest: "https://a.espncdn.com/i/teamlogos/soccer/500/344.png"
    },
    {
      name: "Carlton Blues",
      short: "Carlton",
      query: "Carlton Blues AFL next fixture 2026",
      bg: "#002B5C",
      fg: "#FFFFFF",
      crest: "https://upload.wikimedia.org/wikipedia/en/thumb/9/93/Carlton_Football_Club_logo.svg/200px-Carlton_Football_Club_logo.svg.png"
    }
  ];

  function pad(n) { return String(n).padStart(2, '0'); }

  function formatTimeMelbourne(utcStr) {
    return new Date(utcStr).toLocaleTimeString('en-AU', {
      timeZone: MELBOURNE_TZ, hour: 'numeric', minute: '2-digit', hour12: true
    }).toLowerCase().replace(/\s/g, '');
  }

  function formatDateMelbourne(utcStr) {
    return new Date(utcStr).toLocaleDateString('en-AU', {
      timeZone: MELBOURNE_TZ, weekday: 'short', day: 'numeric', month: 'short'
    }).toUpperCase();
  }

  function getTZLabel(utcStr) {
    const s = new Date(utcStr).toLocaleString('en-AU', { timeZone: MELBOURNE_TZ, timeZoneName: 'short' });
    const m = s.match(/(AEDT|AEST)/);
    return m ? m[0] : 'AEST';
  }

  function getCountdown(utcStr) {
    const diff = new Date(utcStr) - new Date();
    if (diff <= 0) return null;
    const mins = Math.floor(diff / 60000);
    const d = Math.floor(mins / 1440), h = Math.floor((mins % 1440) / 60), m = mins % 60;
    if (d > 0) return `${d}d ${h}h`;
    if (h > 0) return `${h}h ${m}m`;
    return `${m}m`;
  }

  function isLive(utcStr) {
    const diff = new Date() - new Date(utcStr);
    return diff >= 0 && diff < 150 * 60 * 1000;
  }

  async function fetchFixture(team) {
    const today = new Date().toISOString().split('T')[0];
    const prompt = `Search for the next upcoming match for ${team.name} after ${today}.
Return ONLY a JSON object, no other text, no markdown:
{"opponent":"Team Name","home":true,"utc":"2026-03-15T14:00:00Z","venue":"Stadium Name","league":"Competition Name","found":true}
Rules:
- utc must be in UTC ISO 8601 format
- home is true if ${team.name} are the home team
- Use found:false only if genuinely no upcoming fixture exists
- Do not include any text outside the JSON`;

    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 300,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        tool_choice: { type: "auto" },
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (!res.ok) throw new Error(`API ${res.status}: ${await res.text()}`);
    const data = await res.json();

    // If it stopped to do a web search, make one more call with the search results included
    // The web_search tool is server-side — Anthropic runs it and returns results in content blocks
    // We just need to handle the case where stop_reason is tool_use by continuing the conversation
    let finalContent = data.content;
    let finalStopReason = data.stop_reason;

    if (data.stop_reason === 'tool_use') {
      const messages = [
        { role: "user", content: prompt },
        { role: "assistant", content: data.content },
        {
          role: "user",
          content: data.content
            .filter(b => b.type === 'tool_use')
            .map(b => ({ type: "tool_result", tool_use_id: b.id, content: "Search completed." }))
        }
      ];

      const res2 = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 300,
          tools: [{ type: "web_search_20250305", name: "web_search" }],
          messages
        })
      });

      if (!res2.ok) throw new Error(`API2 ${res2.status}`);
      const data2 = await res2.json();
      finalContent = data2.content;
      finalStopReason = data2.stop_reason;
    }

    // Extract JSON from text blocks
    const text = finalContent.filter(b => b.type === 'text').map(b => b.text).join('');
    console.log('Response for', team.name, '| stop:', finalStopReason, '| text:', text);
    const start = text.indexOf('{'), end = text.lastIndexOf('}');
    if (start === -1 || end === -1) throw new Error('No JSON in response: ' + text.slice(0, 200));
    return JSON.parse(text.slice(start, end + 1));
  }

  let state = TEAMS.map(t => ({ team: t, loading: true, fixture: null, error: null }));

  function render() {
    const container = document.getElementById('cards');
    container.innerHTML = '';

    state.forEach(({ team, loading, fixture, error }) => {
      if (loading) {
        const sk = document.createElement('div');
        sk.className = 'skeleton';
        sk.innerHTML = `<div class="skeleton-text">Finding ${team.short}…</div>`;
        container.appendChild(sk);
        return;
      }

      if (!fixture || !fixture.found) {
        const el = document.createElement('div');
        el.className = 'error-card';
        el.textContent = error ? `${team.short} — ${error}` : `${team.short} — no upcoming fixture`;
        container.appendChild(el);
        return;
      }

      const { utc, opponent, home, venue, league } = fixture;
      const live = isLive(utc);
      const countdown = getCountdown(utc);

      const card = document.createElement('div');
      card.className = 'card';
      card.style.background = team.bg;
      card.style.color = team.fg;

      const opponentHtml = home
        ? `<span class="vs">vs</span> ${opponent}`
        : `<span class="vs">@</span> ${opponent}`;

      const liveTag = live
        ? `<span class="pill-live" style="background:${team.fg};color:${team.bg}">Live</span>` : '';

      const countdownHtml = live ? ''
        : countdown ? `<div class="countdown">In <span class="val">${countdown}</span></div>` : '';

      const tz = getTZLabel(utc);

      card.innerHTML = `
        <div class="card-content">
          <div>
            <div class="team-name">${team.name}${liveTag}</div>
            <div class="league">${league || ''}</div>
          </div>
          <div>
            <div class="fixture-row">
              <div class="opponent">${opponentHtml}</div>
              <div class="time-block">
                <div class="time-melbourne">${formatTimeMelbourne(utc)}</div>
                <div class="date-str">${formatDateMelbourne(utc)} · ${tz}</div>
              </div>
            </div>
            <div class="venue">${venue || ''}</div>
            ${countdownHtml}
          </div>
        </div>
        <div class="card-crest">
          <img src="${team.crest}" alt="${team.name}" onerror="this.style.display='none'" />
        </div>
      `;

      container.appendChild(card);
    });

    const now = new Date();
    document.getElementById('updated').textContent =
      `Updated ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  }

  async function loadAll() {
    state = TEAMS.map(t => ({ team: t, loading: true, fixture: null, error: null }));
    render();

    // Fetch sequentially to avoid rate limiting
    for (let i = 0; i < TEAMS.length; i++) {
      try {
        const fixture = await fetchFixture(TEAMS[i]);
        state[i] = { team: TEAMS[i], loading: false, fixture, error: null };
      } catch(e) {
        console.error(TEAMS[i].name, e);
        state[i] = { team: TEAMS[i], loading: false, fixture: null, error: e.message };
      }
      render();
      if (i < TEAMS.length - 1) await new Promise(r => setTimeout(r, 800));
    }
  }

  loadAll();
  setInterval(render, 30000);
  setInterval(loadAll, 3 * 60 * 60 * 1000);
</script>
</body>
</html>
