<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Match</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300;400;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #0f0f0f;
    color: #e8e8e8;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    padding: 48px 32px 64px;
    max-width: 520px;
    margin: 0 auto;
  }

  header { margin-bottom: 56px; }

  .wordmark {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #444;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card {
    padding: 28px 24px;
    border-radius: 2px;
    position: relative;
    overflow: hidden;
    min-height: 150px;
    display: flex;
    align-items: stretch;
    transition: min-height 0.3s ease;
  }

  .card-content {
    flex: 1;
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding-right: 120px;
  }

  .card-crest {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 1;
    width: 100px;
    height: 100px;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.85;
  }

  .card-crest img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
  }

  .team-name {
    font-size: 25px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 5px;
  }

  .league {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 18px;
    opacity: 0.55;
  }

  .fixture-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }

  .opponent { font-size: 13px; font-weight: 300; }

  .vs {
    font-size: 10px;
    margin-right: 4px;
    opacity: 0.5;
  }

  .time-block { text-align: right; flex-shrink: 0; }

  .time-melbourne {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .date-str {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 3px;
    opacity: 0.55;
  }

  .countdown {
    margin-top: 12px;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.55;
  }

  .countdown .val { font-weight: 700; opacity: 1; }

  .pill-live {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 2px 7px;
    margin-left: 8px;
    vertical-align: middle;
    animation: blink 1.4s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  .live-score {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 0;
  }

  .score-team {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.7;
    flex: 1;
  }

  .score-team.home { text-align: left; }
  .score-team.away { text-align: right; }

  .score-nums {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
    padding: 0 12px;
    flex-shrink: 0;
  }

  .score-minute {
    margin-top: 6px;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.5;
    text-align: center;
  }

  .score-loading {
    margin-top: 14px;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.4;
  }

  .venue {
    font-size: 10px;
    margin-top: 5px;
    opacity: 0.4;
  }

  .updated {
    margin-top: 40px;
    font-size: 10px;
    color: #2a2a2a;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .loading-state {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #333;
    padding: 12px 0;
  }

  .skeleton {
    background: #1a1a1a;
    border-radius: 2px;
    min-height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 24px;
  }

  .skeleton-text {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #2a2a2a;
    animation: pulse 1.6s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .error-msg {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #3a3a3a;
    padding: 8px 0;
  }
</style>
</head>
<body>

  const MELBOURNE_TZ = "Australia/Melbourne";
  const CACHE_KEY = "nextmatch_fixtures_v3";
  const CACHE_TTL = 3 * 60 * 60 * 1000; // 3 hours

  // Score cache
  const scoreCache = {};
  const scoreFetching = {};

  function pad(n) { return String(n).padStart(2, '0'); }

  function formatTimeMelbourne(utcStr) {
    const d = new Date(utcStr);
    return d.toLocaleTimeString('en-AU', { timeZone: MELBOURNE_TZ, hour: 'numeric', minute: '2-digit', hour12: true }).toLowerCase().replace(' ', '');
  }

  function formatDateMelbourne(utcStr) {
    const d = new Date(utcStr);
    return d.toLocaleDateString('en-AU', { timeZone: MELBOURNE_TZ, weekday: 'short', day: 'numeric', month: 'short' }).toUpperCase();
  }

  function getMelbourneTZLabel(utcStr) {
    const d = new Date(utcStr);
    const offset = d.toLocaleString('en-AU', { timeZone: MELBOURNE_TZ, timeZoneName: 'short' });
    return offset.match(/\b(AEDT|AEST)\b/) ? offset.match(/\b(AEDT|AEST)\b/)[0] : 'AEST';
  }

  function getCountdown(utcStr) {
    const diff = new Date(utcStr) - new Date();
    if (diff <= 0) return null;
    const mins = Math.floor(diff / 60000);
    const d = Math.floor(mins / 1440), h = Math.floor((mins % 1440) / 60), m = mins % 60;
    if (d > 0) return `${d}d ${h}h`;
    if (h > 0) return `${h}h ${m}m`;
    return `${m}m`;
  }

  function isLive(utcStr) {
    const diff = new Date() - new Date(utcStr);
    return diff >= 0 && diff < 135 * 60 * 1000;
  }

  function isPassed(utcStr) {
    return new Date() - new Date(utcStr) > 135 * 60 * 1000;
  }

  // Fetch next fixture for a team using Claude + web search
  function extractJSON(text) {
    // Try direct parse first
    try { return JSON.parse(text.trim()); } catch(e) {}
    // Try extracting from markdown code block
    const mdMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (mdMatch) { try { return JSON.parse(mdMatch[1].trim()); } catch(e) {} }
    // Try finding first { ... } block
    const start = text.indexOf('{');
    const end = text.lastIndexOf('}');
    if (start !== -1 && end !== -1) {
      try { return JSON.parse(text.slice(start, end + 1)); } catch(e) {}
    }
    return null;
  }

  async function callClaude(messages) {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages
      })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    return res.json();
  }

    const prompt = `Search for the next upcoming fixture for ${teamConfig.team} after ${today}. Find the exact date, time, opponent, venue and competition. Then respond with ONLY a JSON object in this exact format, no other text:

Use found:false if no upcoming fixture found. The utc value must be UTC timezone in ISO 8601 format.`;

    let messages = [{ role: "user", content: prompt }];

    // Agentic loop — keep going until end_turn (handles tool_use -> tool_result cycles)
    for (let i = 0; i < 5; i++) {
      const data = await callClaude(messages);

      // Append assistant response to history
      messages.push({ role: "assistant", content: data.content });

      if (data.stop_reason === "end_turn") {
        // Extract final text
        const text = data.content.filter(b => b.type === "text").map(b => b.text).join("");
        const parsed = extractJSON(text);
        if (!parsed) throw new Error(`No JSON in: ${text.slice(0, 200)}`);
        return parsed;
      }

      if (data.stop_reason === "tool_use") {
        // Build tool_result blocks for each tool_use block
        const toolResults = data.content
          .filter(b => b.type === "tool_use")
          .map(b => ({
            type: "tool_result",
            tool_use_id: b.id,
            content: b.input ? JSON.stringify(b.input) : ""
          }));
        messages.push({ role: "user", content: toolResults });
        continue;
      }

      // Unexpected stop reason — try to extract text anyway
      const text = data.content.filter(b => b.type === "text").map(b => b.text).join("");
      const parsed = extractJSON(text);
      if (parsed) return parsed;
      throw new Error(`Unexpected stop_reason: ${data.stop_reason}`);
    }

    throw new Error("Exceeded max tool-use iterations");
  }

  async function fetchLiveScore(idx, fixture, teamConfig) {
    if (scoreFetching[idx]) return;
    scoreFetching[idx] = true;

    const homeTeam = fixture.home ? teamConfig.teamShort : fixture.opponent;
    const awayTeam = fixture.home ? fixture.opponent : teamConfig.teamShort;

    const prompt = teamConfig.sport === 'afl'
      ? `What is the current live score for the AFL match between ${homeTeam} and ${awayTeam} being played right now today? Reply in JSON only, no markdown, like: {"home":"${homeTeam}","away":"${awayTeam}","homeScore":"X.X (XX)","awayScore":"X.X (XX)","minute":"Q2 8:23","found":true} — or {"found":false} if not currently live.`
      : `What is the current live score for the football match between ${homeTeam} and ${awayTeam} being played right now today? Reply in JSON only, no markdown, like: {"home":"${homeTeam}","away":"${awayTeam}","homeScore":0,"awayScore":0,"minute":"43'","found":true} — or {"found":false} if not live.`;

    try {
      let messages = [{ role: "user", content: prompt }];
      let result = null;
      for (let i = 0; i < 5; i++) {
        const data = await callClaude(messages);
        messages.push({ role: "assistant", content: data.content });
        if (data.stop_reason === "end_turn") {
          const text = data.content.filter(b => b.type === "text").map(b => b.text).join("");
          result = extractJSON(text);
          break;
        }
        if (data.stop_reason === "tool_use") {
          const toolResults = data.content
            .filter(b => b.type === "tool_use")
            .map(b => ({ type: "tool_result", tool_use_id: b.id, content: b.input ? JSON.stringify(b.input) : "" }));
          messages.push({ role: "user", content: toolResults });
        }
      }
      scoreCache[idx] = result || { found: false };
    } catch(e) {
      scoreCache[idx] = { found: false };
    }

    scoreFetching[idx] = false;
    renderCards(window._fixtures);
  }

  function renderCards(fixtures) {
    window._fixtures = fixtures;
    const container = document.getElementById('cards');
    container.innerHTML = '';

    const now = new Date();

    fixtures.forEach((item, idx) => {
      const { teamConfig, fixture, loading, error } = item;

      // Show skeleton while loading
      if (loading) {
        const sk = document.createElement('div');
        sk.className = 'skeleton';
        sk.innerHTML = `<div class="skeleton-text">Finding ${teamConfig.teamShort} fixture…</div>`;
        container.appendChild(sk);
        return;
      }

      // Show error quietly
      if (error || !fixture || !fixture.found) {
        return; // silently skip — no fixture found
      }

      // Skip passed fixtures
      if (isPassed(fixture.utc)) return;

      const live = isLive(fixture.utc);
      const countdown = getCountdown(fixture.utc);

      // Trigger live score fetch
      if (live && scoreCache[idx] === undefined && !scoreFetching[idx]) {
        fetchLiveScore(idx, fixture, teamConfig);
      }

      const card = document.createElement('div');
      card.className = 'card';
      card.style.background = teamConfig.bg;
      card.style.color = teamConfig.fg;

      const opponentHtml = fixture.home
        ? `<span class="vs">vs</span> ${fixture.opponent}`
        : `<span class="vs">@</span> ${fixture.opponent}`;

      const liveTag = live
        ? `<span class="pill-live" style="background:${teamConfig.fg};color:${teamConfig.bg}">Live</span>` : '';

      let liveScoreHtml = '';
      if (live) {
        const cached = scoreCache[idx];
        if (cached === undefined) {
          liveScoreHtml = `<div class="score-loading">Fetching score…</div>`;
        } else if (cached.found) {
          const homeTeam = fixture.home ? teamConfig.teamShort : fixture.opponent;
          const awayTeam = fixture.home ? fixture.opponent : teamConfig.teamShort;
          const homeScore = fixture.home ? cached.homeScore : cached.awayScore;
          const awayScore = fixture.home ? cached.awayScore : cached.homeScore;
          liveScoreHtml = `
            <div class="live-score">
              <div class="score-team home">${homeTeam}</div>
              <div class="score-nums">${homeScore} – ${awayScore}</div>
              <div class="score-team away">${awayTeam}</div>
            </div>
            ${cached.minute ? `<div class="score-minute">${cached.minute}</div>` : ''}
          `;
        } else {
          liveScoreHtml = `<div class="score-loading">Score unavailable</div>`;
        }
      }

      const tz = getMelbourneTZLabel(fixture.utc);
      const countdownHtml = live ? ''
        : countdown
          ? `<div class="countdown">In <span class="val">${countdown}</span></div>`
          : '';

      card.innerHTML = `
        <div class="card-content">
          <div>
            <div class="team-name">${teamConfig.team}${liveTag}</div>
            <div class="league">${fixture.league || ''}</div>
          </div>
          <div>
            <div class="fixture-row">
              <div class="opponent">${opponentHtml}</div>
              <div class="time-block">
                <div class="time-melbourne">${formatTimeMelbourne(fixture.utc)}</div>
                <div class="date-str">${formatDateMelbourne(fixture.utc)} · ${tz}</div>
              </div>
            </div>
            <div class="venue">${fixture.venue || ''}</div>
            ${liveScoreHtml}
            ${countdownHtml}
          </div>
        </div>
        <div class="card-crest">
          <img src="${teamConfig.crest}" alt="${teamConfig.team}" />
        </div>
      `;

      container.appendChild(card);
    });

    const now2 = new Date();
    document.getElementById('updated').textContent =
      `Updated ${pad(now2.getHours())}:${pad(now2.getMinutes())}`;
  }

  async function loadAll(forceRefresh) {
    // Start with skeletons
    const fixtures = TEAMS.map(t => ({ teamConfig: t, fixture: null, loading: true, error: false }));
    renderCards(fixtures);

    // Fetch sequentially to avoid rate limiting
    for (let i = 0; i < TEAMS.length; i++) {
      const teamConfig = TEAMS[i];
      try {
        const fixture = await fetchNextFixture(teamConfig);
        fixtures[i] = { teamConfig, fixture, loading: false, error: false };
      } catch(e) {
        console.error('Fixture fetch failed for', teamConfig.team, e);
        fixtures[i] = { teamConfig, fixture: null, loading: false, error: true };
      }
      renderCards([...fixtures]);
      // Small delay between requests
      if (i < TEAMS.length - 1) await new Promise(r => setTimeout(r, 500));
    }
  }

  loadAll(false);

  // Re-render countdown every 30s
  setInterval(() => {
    if (window._fixtures) renderCards(window._fixtures);
  }, 30000);

  // Re-fetch live scores every 60s
  setInterval(() => {
    if (!window._fixtures) return;
    window._fixtures.forEach((item, idx) => {
      if (item.fixture && isLive(item.fixture.utc)) {
        scoreCache[idx] = undefined;
        fetchLiveScore(idx, item.fixture, item.teamConfig);
      }
    });
  }, 60000);

  // Refresh fixtures every 3 hours
  setInterval(() => loadAll(true), 3 * 60 * 60 * 1000);
</script>
